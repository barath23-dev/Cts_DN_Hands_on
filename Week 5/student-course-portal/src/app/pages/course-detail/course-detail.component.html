<div class="container" style="max-width: 600px;">
  <h2>Course Details</h2>
  
  @if (course) {
    <div class="card" style="margin-top: 1.5rem; border-left: 4px solid var(--primary-color);">
      <span style="font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted);">{{ course.code }}</span>
      <h3 style="margin-top: 0.25rem; font-size: 1.75rem; margin-bottom: 1rem;">{{ course.name }}</h3>
      
      <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem;">
        <p style="margin: 0;"><strong>Course ID:</strong> {{ course.id }}</p>
        <p style="margin: 0;"><strong>Credits:</strong> {{ course.credits }} Credits</p>
        <p style="margin: 0;">
          <strong>Status:</strong> 
          <span style="text-transform: capitalize; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.85rem;" 
                [class]="'badge-' + course.gradeStatus">
            {{ course.gradeStatus }}
          </span>
        </p>
      </div>

      <div style="display: flex; gap: 1rem;">
        <a routerLink="/courses" class="btn-secondary" style="display: inline-block; text-decoration: none; text-align: center; padding: 0.75rem 1.5rem;">Back to Courses</a>
      </div>
    </div>
  } @else {
    <div class="card" style="margin-top: 1.5rem; border-left: 4px solid var(--danger-color); background: rgba(239, 68, 68, 0.08);">
      <h3 style="color: var(--danger-color); margin-bottom: 0.5rem;">Error</h3>
      <p style="margin: 0; color: white;">Course not found or invalid course ID.</p>
      <a routerLink="/courses" class="btn-secondary" style="display: inline-block; text-decoration: none; margin-top: 1rem; padding: 0.5rem 1rem;">Back to Courses</a>
    </div>
  }
</div>
