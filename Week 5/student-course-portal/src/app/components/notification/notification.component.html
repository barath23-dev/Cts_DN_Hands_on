<div class="card" style="margin-top: 1.5rem; border-left: 4px solid var(--primary-color);">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <h3 style="margin: 0; font-size: 1.15rem;">Notifications (Component-Scoped Service)</h3>
    <button class="btn-secondary" style="padding: 0.35rem 0.75rem; font-size: 0.8rem;" (click)="addTestNotification()">Trigger Alert</button>
  </div>
  
  <ul style="padding-left: 1.25rem; margin: 0; line-height: 1.6;">
    <li *ngFor="let notification of notifications" style="color: var(--text-color); font-size: 0.9rem; margin-bottom: 0.5rem;">
      {{ notification }}
    </li>
  </ul>
</div>
